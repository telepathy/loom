apiVersion: v1
kind: Secret
metadata:
  name: loom-mysql
  namespace: gps
type: Opaque
stringData:
  # MySQL DSN 连接串，Loom 启动时通过 DAS_MYSQL_DSN 环境变量引用。
  # 格式: user:password@tcp(host:port)/dbname?charset=utf8mb4&parseTime=True&loc=Local
  dsn: "root:password@tcp(mysql.gps.svc:3306)/loom?charset=utf8mb4&parseTime=True&loc=Local"
